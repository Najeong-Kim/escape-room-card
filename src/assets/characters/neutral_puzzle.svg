  <circle cx="78" cy="90" r="11" fill="#FFFBEB"/>
  <circle cx="122" cy="90" r="11" fill="#FFFBEB"/>
  <ellipse cx="79" cy="91" rx="7" ry="8" fill="#1A0500"/>
  <ellipse cx="123" cy="91" rx="7" ry="8" fill="#1A0500"/>
  <circle cx="81" cy="88" r="2.5" fill="white"/>
  <circle cx="125" cy="88" r="2.5" fill="white"/>
  <!-- Nose -->
