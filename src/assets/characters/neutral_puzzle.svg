<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Fox -->
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#E05D20"/>
  <!-- Face -->
  <ellipse cx="100" cy="110" rx="72" ry="70" fill="#F07030"/>
  <!-- Pointed ears -->
  <path d="M38,80 L26,14 L82,62 Z" fill="#E05D20"/>
  <path d="M50,77 L40,22 L78,60 Z" fill="#CC3300"/>
  <path d="M162,80 L174,14 L118,62 Z" fill="#E05D20"/>
