<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Tiger -->
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#FF7B29"/>
  <!-- Face -->
  <circle cx="100" cy="104" r="80" fill="#FF9A5C"/>
  <!-- Ears -->
  <path d="M40,78 L28,18 L82,62 Z" fill="#FF7B29"/>
  <path d="M50,75 L40,26 L78,60 Z" fill="#CC3300"/>
  <path d="M160,78 L172,18 L118,62 Z" fill="#FF7B29"/>
  <path d="M150,75 L160,26 L122,60 Z" fill="#CC3300"/>
  <!-- Forehead stripes -->
  <path d="M76,28 Q82,42 76,56" stroke="#1A0A00" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M100,20 Q104,36 100,52" stroke="#1A0A00" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M124,28 Q118,42 124,56" stroke="#1A0A00" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Muzzle -->
  <ellipse cx="100" cy="118" rx="28" ry="21" fill="#FFCC99"/>
  <!-- Eyes -->
  <ellipse cx="78" cy="92" rx="12" ry="11" fill="#FFD700"/>
  <ellipse cx="122" cy="92" rx="12" ry="11" fill="#FFD700"/>
  <ellipse cx="79" cy="94" rx="5" ry="8" fill="#1A0A00"/>
  <ellipse cx="123" cy="94" rx="5" ry="8" fill="#1A0A00"/>
  <circle cx="81" cy="91" r="2" fill="white"/>
  <circle cx="125" cy="91" r="2" fill="white"/>
  <!-- Nose -->
  <path d="M93,112 L107,112 L100,119 Z" fill="#CC3300"/>
  <!-- Mouth -->
  <path d="M88,120 Q100,130 112,120" stroke="#CC3300" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="32" y1="114" x2="72" y2="116" stroke="#CC5500" stroke-width="1.5"/>
  <line x1="32" y1="121" x2="72" y2="119" stroke="#CC5500" stroke-width="1.5"/>
  <line x1="128" y1="116" x2="168" y2="114" stroke="#CC5500" stroke-width="1.5"/>
  <line x1="128" y1="119" x2="168" y2="121" stroke="#CC5500" stroke-width="1.5"/>
</svg>
